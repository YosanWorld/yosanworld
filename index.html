<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YosanWorld</title>
    <style>
        body {
            background: linear-gradient(to bottom, #6a5acd, #4b0082);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-top: 20px;
        }
        p {
            font-size: 1.2em;
        }
        .button {
            background-color: #8a2be2;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #7b68ee;
        }
        .social-links {
            margin-top: 20px;
        }
        .social-links a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
        }
        .social-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>👾 YosanWorld</h1>
    </header>
    <main>
        <p>Welcome to the YosanWorld! Explore our amazing content and connect with us!</p>
        <a href="https://instagram.com/yosanworld" class="button">Follow us on Instagram</a>
        <div class="social-links">
            <a href="https://twitter.com/yosanworld">Twitter</a>
            <a href="https://youtube.com/yosanworld">YouTube</a>
            <a href="https://discord.gg/yosanworld">Discord</a>
        </div>
    </main>
</body>
</html>
