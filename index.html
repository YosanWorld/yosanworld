<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YosanWorld | Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0b;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            width: 250px;
            height: 250px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
            background: linear-gradient(135deg, #8a2be2, #4b0082);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-instagram {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-instagram:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(240, 148, 51, 0.4);
        }

        .btn-instagram:active {
            transform: scale(0.98);
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .social-link:hover {
            transform: scale(1.1);
        }

        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            box-shadow: 0 0 15px rgba(240, 148, 51, 0.3);
        }

        .twitter {
            background: linear-gradient(45deg, #1da1f2, #1a8cd8);
            box-shadow: 0 0 15px rgba(29, 161, 242, 0.3);
        }

        .youtube {
            background: linear-gradient(45deg, #ff0000, #cc0000);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .discord {
            background: linear-gradient(45deg, #5865f2, #4752c4);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.3);
        }

        footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌍</div>
        
        <h1>YosanWorld</h1>
        
        <p>¡Bienvenido a mi mundo! Soy YosanWorld, creador de contenido y comunidad apasionado por compartir conocimiento y experiencias.</p>
        
        <a href="https://instagram.com" class="btn-instagram">Sígueme en Instagram</a>
        
        <div class="social-links">
            <a href="https://instagram.com" class="social-link instagram" title="Instagram">📷</a>
            <a href="https://twitter.com" class="social-link twitter" title="Twitter">𝕏</a>
            <a href="https://youtube.com" class="social-link youtube" title="YouTube">▶️</a>
            <a href="https://discord.com" class="social-link discord" title="Discord">💬</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 YosanWorld. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
